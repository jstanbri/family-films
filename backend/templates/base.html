<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Family Films{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root { --pico-font-size: 16px; }
    nav.top-nav { padding: 0.75rem 1.5rem; background: var(--pico-card-background-color);
                  border-bottom: 1px solid var(--pico-muted-border-color);
                  display:flex; align-items:center; gap:2rem; }
    nav.top-nav a { text-decoration:none; font-weight:500; }
    nav.top-nav .brand { font-size:1.2rem; font-weight:700; }
    main.container { padding-top: 1.5rem; }
    .card-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap:1rem; }
    .video-card { border:1px solid var(--pico-muted-border-color); border-radius:8px;
                  padding:1rem; background:var(--pico-card-background-color); }
    .video-card h3 { margin:0 0 0.4rem; font-size:1rem; }
    .video-card .meta { font-size:0.82rem; color:var(--pico-muted-color); }
    .video-card a.watch { display:inline-block; margin-top:0.6rem; font-size:0.85rem; }
    .tag { display:inline-block; padding:0.15rem 0.5rem; border-radius:4px;
           background:#e7eff3; color:var(--pico-primary);
           font-size:0.78rem; margin:0.15rem; }
    .htmx-indicator { opacity:0; transition:opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity:1; }
    video { width:100%; border-radius:6px; background:#000; }
    .delete-btn { --pico-color: var(--pico-del-color, #c0392b); }
    #search-results { min-height: 2rem; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="/" class="brand">🎞 Family Films</a>
    <a href="/videos">All Films</a>
    <a href="/videos/upload">Upload</a>
    <a href="/people">People</a>
    <a href="/people/new">Add Person</a>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
